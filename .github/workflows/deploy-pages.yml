name: Build and Deploy WASM to Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.57

      - name: Configure (Emscripten)
        run: emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release

      - name: Build (Emscripten)
        run: cmake --build build-web --config Release

      - name: Prepare Pages artifact
        run: |
          mkdir -p dist
          cp -r docs/. dist/
          cp build-web/seasonal_tree_raylib.js dist/
          cp build-web/seasonal_tree_raylib.wasm dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
